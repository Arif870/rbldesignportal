<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Roche Card Portal</title>

    <style>
      @font-face {
        font-family: "Roche Sans";
        src: url("./fonts/RocheSans-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Roche Sans";
        src: url("./fonts/RocheSans-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Cream Cake";
        src: url("./fonts/CreamCake.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg: #0b1220;
        --panel: rgba(16, 26, 51, 0.7);
        --border: rgba(255, 255, 255, 0.12);
        --text: #eaf0ff;
        --muted: #9bb0de;
        --roche-blue: #0066cc;
        --shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        --radius: 18px;
        --font:
          "Roche Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--font);
        background: radial-gradient(
          1200px 700px at 20% 10%,
          #1b2b58 0%,
          var(--bg) 60%,
          #070b14 100%
        );
        color: var(--text);
        background-repeat: no-repeat;
        height: 100vh;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(11, 18, 32, 0.75);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
      }

      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 16px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        user-select: none;
      }
      .logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: var(--roche-blue);
        font-size: 10px;
        box-shadow: var(--shadow);
      }
      .brand h1 {
        margin: 0;
        font-size: 16px;
      }
      .brand p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      main .wrap {
        padding-top: 18px;
        padding-bottom: 36px;
      }

      /* Home tiles: 3 columns */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .tile {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.06s ease,
          border-color 0.12s ease;
        text-decoration: none;
        color: inherit;
        display: block;
      }
      .tile:hover {
        border-color: rgba(90, 167, 255, 0.55);
      }
      .tile:active {
        transform: translateY(1px);
      }

      .tileHd {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .tileHd h2 {
        margin: 0;
        font-size: 14px;
      }
      .badge {
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(7, 11, 20, 0.28);
        white-space: nowrap;
      }
      .tileBd {
        padding: 16px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .thumb {
        height: 86px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: linear-gradient(
          135deg,
          rgba(90, 167, 255, 0.18),
          rgba(45, 212, 191, 0.12)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(234, 240, 255, 0.8);
        font-weight: 800;
        letter-spacing: 0.3px;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="wrap">
        <div class="row">
          <div class="brand">
            <div class="logo" aria-hidden="true">Roche</div>
            <div>
              <h1>Roche Card Portal</h1>
              <p>Select a template to start</p>
            </div>
          </div>
          <div style="color: var(--muted); font-size: 12px">
            Browser-only • Network ready
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="wrap">
        <div class="grid">
          <a class="tile" href="./birthday.html">
            <div class="tileHd">
              <h2>Birthday Card</h2>
              <span class="badge">LIVE</span>
            </div>
            <div class="tileBd">
              <div class="thumb">Birthday</div>
              <div>Open the working Birthday card editor.</div>
            </div>
          </a>

          <a class="tile" href="./work.html">
            <div class="tileHd">
              <h2>Work Anniversary</h2>
              <span class="badge">LIVE</span>
            </div>
            <div class="tileBd">
              <div class="thumb">Work Anniversary</div>
              <div>Open the Work Anniversary editor.</div>
            </div>
          </a>

         <a class="tile" href="./eid.html">
            <div class="tileHd">
              <h2>Eid Ul Fitr 2026</h2>
              <span class="badge">LIVE</span>
            </div>
            <div class="tileBd">
              <div class="thumb" style="background: linear-gradient(135deg, rgba(90, 167, 255, 0.18), rgba(45, 212, 191, 0.12)); color: rgba(234, 240, 255, 0.8);">Eid Mubarak</div>
              <div>Open the Eid Ul Fitr 2026 editor.</div>
            </div>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
